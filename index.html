<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 h-screen flex flex-col overflow-hidden">

  <!-- Nav -->
  <nav class="border-b border-stone-200 bg-stone-50 flex-shrink-0">
    <div class="px-6 py-4 flex justify-center items-center gap-8 text-sm text-stone-500 font-light">
      <a href="travel.html" class="hover:text-stone-800 transition-colors">Travel</a>
      <a href="hobbies.html" class="hover:text-stone-800 transition-colors">Discovery</a>
      <a href="calendar.html" class="hover:text-stone-800 transition-colors">Calendar</a>
    </div>
  </nav>

  <!-- Photo Wall -->
  <main class="flex-1 p-1 overflow-hidden">
    <div class="h-full grid gap-1" style="
      grid-template-columns: 1.6fr 1fr 1.05fr 1.05fr;
      grid-template-rows: 1.5fr 1fr 1fr;
    ">

      <!-- A: tall left photo, rows 1–2 -->
      <div style="grid-column:1; grid-row:1/3" class="bg-stone-200 overflow-hidden">
        <!-- photo -->
      </div>

      <!-- Name card: col 2–3, row 1 -->
      <div style="grid-column:2/4; grid-row:1" class="bg-stone-100 px-10 py-8 flex flex-col justify-end">
        <p class="text-xs tracking-widest uppercase text-stone-400 mb-3">Hello, I'm</p>
        <h1 class="text-5xl font-bold text-stone-900 leading-tight mb-4">Valen Wei</h1>
        <p class="text-stone-400 font-light text-sm leading-relaxed max-w-xs">
          Designer, explorer, and digital nomad — collecting experiences across 21 countries.
        </p>
      </div>

      <!-- B: photo, col 4 row 1 -->
      <div style="grid-column:4; grid-row:1" class="bg-stone-300 overflow-hidden">
        <!-- photo -->
      </div>

      <!-- C: photo, col 2 row 2 -->
      <div style="grid-column:2; grid-row:2" class="bg-stone-200 overflow-hidden">
        <!-- photo -->
      </div>

      <!-- G: photo, col 3 row 2 -->
      <div style="grid-column:3; grid-row:2" class="bg-stone-200 overflow-hidden">
        <!-- photo -->
      </div>

      <!-- D: photo, col 4 row 2 -->
      <div style="grid-column:4; grid-row:2" class="bg-stone-300 overflow-hidden">
        <!-- photo -->
      </div>

      <!-- E: wide photo, col 1–2 row 3 -->
      <div style="grid-column:1/3; grid-row:3" class="bg-stone-300 overflow-hidden">
        <!-- photo -->
      </div>

      <!-- F: photo, col 3 row 3 -->
      <div style="grid-column:3; grid-row:3" class="bg-stone-200 overflow-hidden">
        <!-- photo -->
      </div>

      <!-- Contact card: col 4 row 3 -->
      <div style="grid-column:4; grid-row:3" class="bg-stone-900 px-7 py-6 flex flex-col justify-end gap-2">
        <a href="mailto:valenwei113@gmail.com"
           class="text-stone-400 hover:text-stone-100 text-xs font-light tracking-wide transition-colors">
          valenwei113@gmail.com
        </a>
        <a href="https://www.linkedin.com/in/lan-w-73a82b178/" target="_blank"
           class="text-stone-400 hover:text-stone-100 text-xs font-light tracking-wide transition-colors">
          LinkedIn ↗
        </a>
      </div>

    </div>
  </main>

</body>
</html>
