<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&family=Great+Vibes&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }

    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.8s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Letter-by-letter for title */
    .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* Nav link hover */
    .nav-link {
      display: block;
      text-align: center;
      letter-spacing: 0.08em;
      transition: letter-spacing 0.4s ease, color 0.3s ease, opacity 0.3s ease;
    }
    .nav-link:hover {
      letter-spacing: 0.2em;
      opacity: 1 !important;
    }
    /* Dim non-hovered links */
    .nav-group:hover .nav-link:not(:hover) {
      opacity: 0.35;
    }

    /* Blur-clear for quote */
    @keyframes fadeBlur {
      from { opacity: 0; filter: blur(6px); letter-spacing: 0.18em; }
      to   { opacity: 1; filter: blur(0);   letter-spacing: 0.04em; }
    }
    .fade-blur {
      opacity: 0;
      animation: fadeBlur 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    #music-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 50;
      width: 36px;
      height: 36px;
      border: 1px solid #d6d3d1;
      background: rgba(250,250,249,0.85);
      backdrop-filter: blur(6px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #music-btn:hover { border-color: #a8a29e; background: rgba(250,250,249,0.98); }

    /* Spinning vinyl when playing */
    #music-btn.playing #vinyl {
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Scrolling song title */
    #music-label {
      position: fixed;
      bottom: 30px;
      left: 68px;
      z-index: 50;
      font-size: 11px;
      color: #a8a29e;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
    }
    #music-label.visible { opacity: 1; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 h-screen flex flex-col overflow-hidden">

  <main class="flex-1 flex overflow-hidden">

    <!-- Left: photo slideshow with nav overlay -->
    <div class="w-1/2 flex-shrink-0 relative overflow-hidden">
      <img id="slide-0" src="home/casual.jpg" alt="Valen"
           class="absolute inset-0 w-full h-full object-cover object-top transition-opacity duration-[1500ms]" style="opacity:1;" />
      <img id="slide-1" src="home/bali.JPG" alt="Bali"
           class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:0; object-position: center 80%;" />
      <img id="slide-2" src="home/bali1.JPG" alt="Bali"
           class="absolute inset-0 w-full h-full object-cover object-center transition-opacity duration-[1500ms]" style="opacity:0;" />
      <div class="absolute inset-0" style="background: linear-gradient(to right, transparent 70%, #fafaf9 100%); z-index:1;"></div>
      <!-- Nav overlay -->
      <div class="nav-group absolute inset-y-0 left-0 flex flex-col justify-center items-center w-20" style="z-index:3; font-family:'Cormorant Garamond',serif; font-weight:700;">
        <a href="travel.html"   class="nav-link fade-up text-white/80 hover:text-white py-2" style="font-size:14px; animation-delay:0.2s;">Traces</a>
        <a href="hobbies.html"  class="nav-link fade-up text-white/80 hover:text-white py-2" style="font-size:14px; animation-delay:0.27s;">Discovery</a>
        <a href="dwelling.html" class="nav-link fade-up text-white/80 hover:text-white py-2" style="font-size:14px; animation-delay:0.34s;">Dwelling</a>
        <a href="vlog.html"     class="nav-link fade-up text-white/80 hover:text-white py-2" style="font-size:14px; animation-delay:0.41s;">Vlog</a>
        <a href="tips.html"     class="nav-link fade-up text-white/80 hover:text-white py-2" style="font-size:14px; animation-delay:0.48s;">Tips</a>
        <a href="calendar.html" class="nav-link fade-up text-white/80 hover:text-white py-2" style="font-size:14px; animation-delay:0.55s;">Calendar</a>
      </div>
      <!-- Quote overlay -->
      <p class="fade-blur absolute top-8 left-24 text-white/70 text-2xl whitespace-nowrap" style="font-family:'Great Vibes',cursive; animation-delay:0.6s; z-index:2;">Courage is fear walking</p>
    </div>

    <!-- Right: video -->
    <div class="flex-1 relative overflow-hidden">
      <video id="bg-vid-0" autoplay muted playsinline
             class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:1;">
        <source src="home/backpack.mov" type="video/mp4" />
      </video>
      <video id="bg-vid-1" muted playsinline
             class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:0;">
        <source src="home/iceland.mov" type="video/mp4" />
      </video>
      <video id="bg-vid-2" muted playsinline
             class="absolute inset-0 w-full h-full object-cover transition-opacity duration-[1500ms]" style="opacity:0;">
        <source src="home/norway.mov" type="video/mp4" />
      </video>
      <div class="absolute inset-0" style="background: linear-gradient(to left, transparent 70%, #fafaf9);"></div>
      <div class="fade-up absolute bottom-6 right-6 flex flex-col gap-1 text-xs font-semibold text-white/60 text-right" style="animation-delay:0.7s;">
        <a href="mailto:valenwei113@gmail.com" class="hover:text-white transition-colors">valenwei113@gmail.com</a>
        <a href="https://www.linkedin.com/in/lan-w-73a82b178/" target="_blank" class="hover:text-white transition-colors">LinkedIn ↗</a>
      </div>
    </div>


  </main>


  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="home/Ellie Goulding-How Long Will I Love You.mp3" type="audio/mpeg" />
  </audio>

  <!-- Music button -->
  <button id="music-btn" onclick="toggleMusic()" title="Toggle music">
    <svg id="vinyl" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="8" r="7" stroke="#a8a29e" stroke-width="1"/>
      <circle cx="8" cy="8" r="2.5" stroke="#a8a29e" stroke-width="1"/>
      <circle cx="8" cy="8" r="1" fill="#a8a29e"/>
    </svg>
  </button>
  <span id="music-label">How Long Will I Love You — Ellie Goulding</span>

  <script>
    // Auto slideshow
    // Mixed slideshow: video + photos
    // Photo slideshow (left)
    const slides = [0, 1, 2].map(i => document.getElementById('slide-' + i));
    let cur = 0;
    setInterval(() => {
      slides[cur].style.opacity = '0';
      cur = (cur + 1) % slides.length;
      slides[cur].style.opacity = '1';
    }, 4000);

    // Video background slideshow (right) — play once then switch
    const bgVids = [0, 1, 2].map(i => document.getElementById('bg-vid-' + i));
    let bgCur = 0;
    bgVids[0].play();
    bgVids.forEach((vid, i) => {
      vid.addEventListener('ended', () => {
        vid.style.opacity = '0';
        bgCur = (i + 1) % bgVids.length;
        bgVids[bgCur].style.opacity = '1';
        bgVids[bgCur].play();
      });
    });


    const audio = document.getElementById('bg-music');
    const btn   = document.getElementById('music-btn');
    const label = document.getElementById('music-label');

    audio.volume = 0.35;

    // Try autoplay on load
    window.addEventListener('load', () => {
      audio.play().then(() => {
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      }).catch(() => {
        // Autoplay blocked — wait for first interaction
        document.addEventListener('click', () => {
          audio.play();
          btn.classList.add('playing');
        }, { once: true });
      });
    });

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      } else {
        audio.pause();
        btn.classList.remove('playing');
        label.classList.remove('visible');
      }
    }
  </script>
</body>
</html>
