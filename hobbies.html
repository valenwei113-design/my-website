<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery · Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    nav a { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 300; letter-spacing: 0.08em; }
    h1, h2 { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800">

  <!-- Nav -->
  <nav class="fixed top-0 w-full bg-stone-50/90 backdrop-blur-sm z-10 border-b border-stone-200">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-center items-center gap-8 text-sm text-stone-500 font-light">
      <a href="index.html" class="hover:text-stone-800 transition-colors">Home</a>
      <a href="travel.html" class="hover:text-stone-800 transition-colors">Traces</a>
      <a href="hobbies.html" class="text-stone-800 font-medium">Discovery</a>
      <a href="dwelling.html" class="hover:text-stone-800 transition-colors">Dwelling</a>
      <a href="vlog.html" class="hover:text-stone-800 transition-colors">Vlog</a>
      <a href="tips.html" class="hover:text-stone-800 transition-colors">Tips</a>

    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 pt-28 pb-24">

    <p class="text-sm tracking-widest uppercase text-stone-400 mb-4">Interests</p>
    <h1 class="text-5xl font-bold text-stone-900 mb-4">Discovery</h1>
    <p class="text-stone-500 font-light mb-14 max-w-lg">Things that keep me passionate outside of work.</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

      <!-- Scuba Diving -->
      <div class="border border-stone-200 rounded-sm overflow-hidden hover:border-stone-400 transition-colors">
        <video
          src="discovery/diving.mov"
          autoplay
          muted
          loop
          playsinline
          class="w-full aspect-video object-cover"
        ></video>
        <div class="p-5">
          <h3 class="font-medium text-stone-800 mb-1">Scuba Diving</h3>
          <p class="text-sm text-stone-500 font-light">Exploring the world beneath the surface</p>
        </div>
      </div>

      <!-- Horse Riding -->
      <div class="border border-stone-200 rounded-sm overflow-hidden hover:border-stone-400 transition-colors">
        <video
          src="discovery/riding.mov"
          autoplay
          muted
          loop
          playsinline
          class="w-full aspect-video object-cover"
        ></video>
        <div class="p-5">
          <h3 class="font-medium text-stone-800 mb-1">Horse Riding</h3>
          <p class="text-sm text-stone-500 font-light">Finding freedom on horseback</p>
        </div>
      </div>

      <!-- Boxing -->
      <div class="border border-stone-200 rounded-sm overflow-hidden hover:border-stone-400 transition-colors">
        <video
          src="discovery/boxing.mov"
          autoplay
          muted
          loop
          playsinline
          class="w-full aspect-video object-cover"
        ></video>
        <div class="p-5">
          <h3 class="font-medium text-stone-800 mb-1">Boxing</h3>
          <p class="text-sm text-stone-500 font-light">Discipline and strength in every round</p>
        </div>
      </div>

    </div>

  </main>

  <footer class="border-t border-stone-200">
    <div class="max-w-5xl mx-auto px-6 py-8 flex justify-between items-center text-xs text-stone-300 font-light">
      <span>© 2026 Valen Wei</span>
      <span>Made with care</span>
    </div>
  </footer>

</body>
</html>
